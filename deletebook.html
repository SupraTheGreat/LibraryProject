<!DOCTYPE html>
<html>
<head>
    <title>Delete Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Delete Book</h2>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <form method="POST">

        <label>Book ID</label><br>
        <input type="number" name="id" required>

        <br><br>

        <button type="submit">Delete Book</button>

    </form>

    <br>

    <a href="/staff_dashboard">
        <button>Back</button>
    </a>
</div>

</body>
</html>
