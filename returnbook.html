<!DOCTYPE html>
<html>
<head>
    <title>Return Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Return Book</h2>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <form method="POST">
        <label>Book Title</label><br>
        <input type="text" name="title" required>

        <br><br>

        <button type="submit">Return</button>

    </form>

    <br>

    <a href="/dashboard">
        <button>Back</button>
    </a>

</div>

</body>
</html>
