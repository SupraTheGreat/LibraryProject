<!DOCTYPE html>
<html>
<head>
    <title>View All Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>All Students</h2>

    <table>
        <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Email</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.user }}</td>
            <td>{{ student.password }}</td>
            <td>{{ student.email }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <a href="/staff_dashboard">
        <button>Back</button>
    </a>
</div>

</body>
</html>
