<!DOCTYPE html>
<html>
<head>
    <title>All Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>All Books</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
            <th>Borrower</th>
            <th>Borrower ID</th>
        </tr>

        {% for book in books %}
        <tr>
            <td>{{ book.id }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.availability }}</td>
            <td>{{ book.checked_out_by }}</td>
            <td>{{ book.checked_out_by_id }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <a href="/staff_dashboard">
        <button>Back</button>
    </a>
</div>

</body>
</html>
