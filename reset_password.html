<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Reset Password</h2>

    <form method="POST">

        <input
            type="password"
            name="password"
            placeholder="New Password"
            required
        >

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

</body>
</html>
