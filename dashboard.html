<!DOCTYPE html>
<html>
<head>
    <title>Supra's Library</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard-wrapper">

    <div class="dashboard-header">

        <div>
            <h1>Welcome, {{ username }}</h1>
            <p>Student Portal</p>
        </div>

        <a href="/logout">
            <button class="logout-btn">
                Logout
            </button>
        </a>

    </div>

    <div class="student-grid">

        <a href="/availablebooks" class="dashboard-card">
            <h2>📚</h2>
            <h3>Available Books</h3>
            <p>Browse books ready for checkout.</p>
        </a>

        <a href="/checkout" class="dashboard-card">
            <h2>📖</h2>
            <h3>Checkout Book</h3>
            <p>Borrow a library book.</p>
        </a>

        <a href="/returnbook" class="dashboard-card">
            <h2>↩️</h2>
            <h3>Return Book</h3>
            <p>Return a checked-out book.</p>
        </a>

        <a href="/getusercheckedout" class="dashboard-card">
            <h2>📋</h2>
            <h3>My Books</h3>
            <p>View books currently borrowed.</p>
        </a>

    </div>

</div>

</body>
</html>
